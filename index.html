<!DOCTYPE html>
<html>
<head>
  <title>2Thirds Live Betting</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; text-align:center; background:#0f172a; color:white; }
    input, button { padding:10px; margin:5px; border-radius:8px; border:none; }
    button { background:#38bdf8; cursor:pointer; font-weight:bold; }
    button:disabled { background:#888; cursor:not-allowed; }
    .box { background:#1e293b; padding:20px; border-radius:15px; margin:10px auto; width:350px; }
    .game, .bet, .leader, .totals { background:#334155; margin:5px; padding:10px; border-radius:8px; }
    .selected { background:#22c55e !important; color:black; }
  </style>
</head>
<body>

<h1>🔥 2Thirds Live Betting 🔥</h1>

<div class="box">
  <input id="nickname" placeholder="Enter Nickname">
  <p>💰 Balance: <span id="balance">50</span> coins</p>
  <input id="coins" type="number" placeholder="Coins to Bet" min="1">

  <h3>Pick a Game</h3>
  <div id="games"></div>

  <h3>Pick Team</h3>
  <button id="team1Btn">Team 1</button>
  <button id="team2Btn">Team 2</button>

  <button id="placeBetBtn">Place Bet</button>
</div>

<h2>📊 Live Bets</h2>
<div id="bets"></div>

<h2>💰 Team Totals per Game</h2>
<div id="totals"></div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<script>
  // 🔴 Supabase Setup
  const supabaseUrl = 'https://YOUR_PROJECT.supabase.co';
  const supabaseKey = 'YOUR_ANON_KEY';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const nicknameInput = document.getElementById("nickname");
  const coinsInput = document.getElementById("coins");
  const placeBetBtn = document.getElementById("placeBetBtn");
  const balanceSpan = document.getElementById("balance");
  const betsDiv = document.getElementById("bets");
  const totalsDiv = document.getElementById("totals");
  const leaderboardDiv = document.getElementById("leaderboard");
  const gamesDiv = document.getElementById("games");
  const team1Btn = document.getElementById("team1Btn");
  const team2Btn = document.getElementById("team2Btn");

  let userBalance = 50;
  let nickname = "";
  let selectedGame = null;
  let selectedSide = "";

  const games = [
    { group: "A", team1: "Mexico", team2: "South Africa" },
    { group: "A", team1: "South Korea", team2: "Czechia" },
    { group: "B", team1: "Canada", team2: "Bosnia" },
    { group: "D", team1: "USA", team2: "Paraguay" },
    { group: "C", team1: "Brazil", team2: "Morocco" },
    { group: "E", team1: "Germany", team2: "Curaçao" },
    { group: "F", team1: "Netherlands", team2: "Japan" },
    { group: "H", team1: "Spain", team2: "Uruguay" }
  ];

  // Load games
  function loadGames() {
    gamesDiv.innerHTML = "";
    games.forEach(game => {
      const div = document.createElement("div");
      div.className = "game";
      div.innerText = `${game.team1} vs ${game.team2} (Group ${game.group})`;
      div.onclick = () => {
        selectedGame = game;
        selectedSide = "";
        team1Btn.innerText = game.team1;
        team2Btn.innerText = game.team2;
        team1Btn.classList.remove("selected");
        team2Btn.classList.remove("selected");
      };
      gamesDiv.appendChild(div);
    });
  }

  // Pick team
  team1Btn.onclick = () => pickTeam("team1");
  team2Btn.onclick = () => pickTeam("team2");
  function pickTeam(which) {
    if (!selectedGame) { alert("Select a game first!"); return; }
    selectedSide = which === "team1" ? selectedGame.team1 : selectedGame.team2;
    team1Btn.classList.remove("selected");
    team2Btn.classList.remove("selected");
    if (which === "team1") team1Btn.classList.add("selected");
    else team2Btn.classList.add("selected");
  }

  // Initialize user
  nicknameInput.addEventListener("change", async () => {
    nickname = nicknameInput.value.trim();
    if (!nickname) return;
    const { data, error } = await supabase.from('users').select('*').eq('nickname', nickname);
    if (!data.length) {
      await supabase.from('users').insert({ nickname, balance: 50 });
      userBalance = 50;
    } else userBalance = data[0].balance;
    balanceSpan.innerText = userBalance;
    checkBalance();
  });

  function checkBalance() { placeBetBtn.disabled = userBalance <= 0; }

  // Place Bet
  placeBetBtn.onclick = async () => {
    nickname = nicknameInput.value.trim();
    const coins = parseInt(coinsInput.value);
    if (!nickname || !coins || !selectedGame || !selectedSide) { alert("Fill all fields!"); return; }
    if (coins > userBalance) { alert("Not enough coins!"); return; }

    try {
      userBalance -= coins;
      balanceSpan.innerText = userBalance;
      checkBalance();
      // Update balance
      await supabase.from('users').update({ balance: userBalance }).eq('nickname', nickname);
      // Insert bet
      await supabase.from('bets').insert({
        user_id: nickname,
        game: `${selectedGame.team1} vs ${selectedGame.team2}`,
        side: selectedSide,
        coins,
        created_at: new Date()
      });
      coinsInput.value = "";
      selectedGame = null;
      selectedSide = "";
      team1Btn.innerText = "Team 1";
      team2Btn.innerText = "Team 2";
      team1Btn.classList.remove("selected");
      team2Btn.classList.remove("selected");
    } catch (err) { console.error(err); alert("Error placing bet"); }
  };

  // Live bets listener
  supabase.from('bets').on('INSERT', payload => {
    const bet = payload.new;
    const div = document.createElement("div");
    div.className = "bet";
    div.innerHTML = `<strong>${bet.user_id}</strong> bet <strong>${bet.coins} coins</strong> on <strong>${bet.side}</strong> (${bet.game})`;
    betsDiv.appendChild(div);
    updateTotals();
  }).subscribe();

  // Update totals per game
  async function updateTotals() {
    const { data: bets } = await supabase.from('bets').select('*');
    const totals = {};
    bets.forEach(bet => {
      if (!totals[bet.game]) totals[bet.game] = {};
      if (!totals[bet.game][bet.side]) totals[bet.game][bet.side] = 0;
      totals[bet.game][bet.side] += bet.coins;
    });
    totalsDiv.innerHTML = "";
    for (const game in totals) {
      const div = document.createElement("div");
      div.className = "totals";
      let text = `<strong>${game}</strong><br>`;
      for (const side in totals[game]) text += `${side}: ${totals[game][side]} coins<br>`;
      div.innerHTML = text;
      totalsDiv.appendChild(div);
    }
  }

  // Leaderboard
  supabase.from('users').on('UPDATE', payload => { renderLeaderboard(); }).subscribe();
  async function renderLeaderboard() {
    const { data: users } = await supabase.from('users').select('*');
    leaderboardDiv.innerHTML = "";
    users.sort((a,b)=>b.balance - a.balance);
    users.forEach(u => {
      const div = document.createElement("div");
      div.className = "leader";
      div.innerHTML = `🏅 ${u.nickname}: ${u.balance} coins`;
      leaderboardDiv.appendChild(div);
    });
  }

  loadGames();
  renderLeaderboard();
  updateTotals();
</script>

</body>
</html>
